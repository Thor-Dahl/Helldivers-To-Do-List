<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="app-container">
        <div class="body-container">
        <div class="main-container">
            <div class="add-item-container">
                <div class="add-item-head">
                    <input class="add-item-text" id="add-item-text" type="text" placeholder="Add Item">
                    <button class="button" id="button-submit">
                        <span class="btn-transition"></span>
                        <span class="btn-label"><span class="material-symbols-outlined" id="submit-icon">arrow_forward</span></span>
                    </button>
                </div>
                <div class="add-item-options">
                    <select class="button" id="deadline" name="deadlne">
                        <span class="btn-transition"></span>
                        <option class="btn-label">DEADLINE</option>
                    </select>
                    <select class="button" id="priority" name="priority">
                        <span class="btn-transition"></span>
                        <option class="btn-label">PRIORITY</option>
                        <option value="high">HIGH</option>
                        <option value="medium">MEDIUM</option>
                        <option value="low">LOW</option>
                    </select>
                </div>
            </div>
            <div class="list-container-ongoing"> 
                <h2><span>S-01 · OPERATIONS ONGOING</span></h2>
                <div class="list-item">
                    <div class="list-item-content">
                        <div class="list-item-header">
                            <input type="checkbox" id="100">
                            <label for="100" id="list-item-title">Deploy Security Patch</label>
                            <span class="list-item-deadline">DUE TODAY</span>
                        </div>
                        <div class="list-item-body">
                            <p>Update all production servers with the latest vulnerability fix before the deadline window closes at end of day.</p>
                        </div>
                        <div class="list-item-priority">
                            <span>HIGH PRIORITY</span>
                        </div>
                    </div>
                    <div class="list-item-options">
                        <span class="material-symbols-outlined" id="drag_indicator_list_option">drag_indicator</span>
                        <span class="material-symbols-outlined" id="delete_list_option">delete</span>
                        <span class="material-symbols-outlined" id="edit_list_option">edit</span>
                    </div>
                </div>
            </div>
            <div class="list-container-accomplished">
                <h2><span>V-01 · OPERATIONS ACCOMPLISHED</span></h2>
            </div>
        </div>
    </div class="app-container">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="script.js"></script>
</body>
</html>
